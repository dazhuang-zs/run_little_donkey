<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论洞察助手</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 评论洞察助手</h1>
            <p class="subtitle">输入分享链接，智能分析评论内容</p>
        </header>

        <main>
            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="url-input" 
                        placeholder="请输入小红书/大众点评/抖音分享链接..."
                        autocomplete="off"
                    >
                    <button id="analyze-btn">开始分析</button>
                </div>
                <div class="supported-platforms">
                    <span>支持平台：</span>
                    <span class="platform-tag">小红书</span>
                    <span class="platform-tag">大众点评</span>
                    <span class="platform-tag">抖音</span>
                </div>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>正在分析评论...</p>
            </div>

            <div id="result" class="result-section hidden">
                <div class="platform-info">
                    <span class="platform-badge" id="platform-badge"></span>
                    <span class="content-id" id="content-id"></span>
                </div>

                <div class="sentiment-bar">
                    <div class="sentiment-label">情感分析</div>
                    <div class="sentiment-stats">
                        <div class="stat positive">
                            <span class="count" id="positive-count">0</span>
                            <span class="label">正面</span>
                        </div>
                        <div class="stat neutral">
                            <span class="count" id="neutral-count">0</span>
                            <span class="label">中性</span>
                        </div>
                        <div class="stat negative">
                            <span class="count" id="negative-count">0</span>
                            <span class="label">负面</span>
                        </div>
                    </div>
                </div>

                <div class="result-cards">
                    <div class="card summary">
                        <h3>✅ 有用总结</h3>
                        <ul id="summary-list"></ul>
                    </div>

                    <div class="card pitfalls">
                        <h3>⚠️ 避坑指南</h3>
                        <ul id="pitfalls-list"></ul>
                    </div>

                    <div class="card uncertain">
                        <h3>❓ 待确认</h3>
                        <ul id="uncertain-list"></ul>
                    </div>
                </div>

                <div class="actions">
                    <button id="copy-btn" class="secondary-btn">复制结果</button>
                    <button id="new-analysis-btn" class="primary-btn">新分析</button>
                </div>
            </div>

            <div id="error" class="error-section hidden">
                <p id="error-message"></p>
            </div>
        </main>

        <footer>
            <p>© 2026 评论洞察助手 · MVP 版本</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
