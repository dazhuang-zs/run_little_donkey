<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问鼎中原 - 各省争霸统一天下</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 地图容器 - 全屏 -->
    <div id="chinaMap"></div>

    <!-- 顶部标题叠加层 -->
    <div class="header-overlay">
        <h1>问鼎中原</h1>
        <p class="subtitle">各省英雄，谁主沉浮</p>
    </div>

    <!-- 底部状态栏 -->
    <div class="status-bar">
        <span class="status-item">
            <span class="status-label">第</span>
            <span id="roundNumber" class="status-value">1</span>
            <span class="status-label">轮</span>
        </span>
        <span class="status-separator">|</span>
        <span class="status-item">
            <span class="status-label">存活:</span>
            <span id="aliveCount" class="status-value">34</span>
            <span class="status-label">省</span>
        </span>
    </div>

    <!-- 对决信息浮层 -->
    <div id="battleOverlay" class="battle-overlay">
        <div class="battle-content">
            <div class="battle-header">
                <span class="battle-title">巅峰对决</span>
            </div>
            <div class="battle-provinces">
                <div class="province-side attacker">
                    <div class="province-name" id="attackerName">-</div>
                    <div class="province-hero" id="attackerHero">-</div>
                </div>
                <div class="vs-divider">VS</div>
                <div class="province-side defender">
                    <div class="province-name" id="defenderName">-</div>
                    <div class="province-hero" id="defenderHero">-</div>
                </div>
            </div>
            <div class="battle-dimensions" id="battleDimensions">
                <!-- 6维度对比将通过JS动态生成 -->
            </div>
            <div class="battle-result" id="battleResult"></div>
        </div>
    </div>

    <!-- 最终胜利画面 -->
    <div id="victoryOverlay" class="victory-overlay">
        <div class="victory-content">
            <div class="victory-crown">👑</div>
            <h2 class="victory-title">天下一统</h2>
            <div class="victory-province" id="victoryProvince">-</div>
            <div class="victory-heroes">
                <h3>风云人物</h3>
                <div id="victoryHeroesList" class="heroes-scroll"></div>
            </div>
            <div id="victoryRadar" class="victory-radar"></div>
            <div class="victory-particles">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/battle.js"></script>
    <script src="js/map.js"></script>
    <script src="js/animation.js"></script>
</body>
</html>
