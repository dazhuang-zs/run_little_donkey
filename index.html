<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      font-family: 'Silkscreen', cursive;
      color: #e8e8e8;
      overflow: hidden;
    }
    .game-container {
      text-align: center;
      padding: 24px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: #4ade80;
      text-shadow: 0 0 20px rgba(74, 222, 128, 0.4);
    }
    .score-bar {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }
    .score-bar span {
      color: #94a3b8;
    }
    .score-bar strong {
      color: #4ade80;
      margin-left: 4px;
    }
    #gameCanvas {
      display: block;
      margin: 0 auto;
      background: #0d1117;
      border: 3px solid #2d3748;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 60px rgba(0, 0, 0, 0.3);
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15, 15, 26, 0.92);
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .overlay h2 {
      font-size: 1.8rem;
      margin-bottom: 16px;
      color: #f87171;
    }
    .overlay p {
      margin-bottom: 24px;
      color: #94a3b8;
      font-size: 0.85rem;
    }
    .btn {
      font-family: 'Silkscreen', cursive;
      font-size: 0.9rem;
      padding: 12px 28px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: linear-gradient(180deg, #4ade80 0%, #22c55e 100%);
      color: #0f0f1a;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(74, 222, 128, 0.5);
    }
    .btn:active {
      transform: translateY(0);
    }
    .canvas-wrap {
      position: relative;
      display: inline-block;
    }
    .hint {
      margin-top: 16px;
      font-size: 0.7rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>🐍 贪吃蛇</h1>
    <div class="score-bar">
      <span>得分 <strong id="score">0</strong></span>
      <span>最高 <strong id="highScore">0</strong></span>
    </div>
    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      <div class="overlay" id="startOverlay">
        <h2>准备开始</h2>
        <p>使用 ↑ ↓ ← → 或 W A S D 控制方向</p>
        <button class="btn" id="startBtn">开始游戏</button>
      </div>
      <div class="overlay" id="gameOverOverlay">
        <h2>游戏结束</h2>
        <p>得分：<strong id="finalScore">0</strong></p>
        <button class="btn" id="restartBtn">再来一局</button>
      </div>
    </div>
    <p class="hint">吃到食物变长，撞墙或撞到自己则结束</p>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const GRID_SIZE = 20;
    const TILE_COUNT = canvas.width / GRID_SIZE;

    let snake = [];
    let food = { x: 0, y: 0 };
    let direction = { x: 0, y: 0 };
    let nextDirection = { x: 0, y: 0 };
    let score = 0;
    let highScore = parseInt(localStorage.getItem('snakeHighScore') || '0', 10);
    let gameLoopId = null;
    let gameSpeed = 120;

    const startOverlay = document.getElementById('startOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const finalScoreEl = document.getElementById('finalScore');

    highScoreEl.textContent = highScore;

    function initSnake() {
      const center = Math.floor(TILE_COUNT / 2);
      snake = [
        { x: center, y: center },
        { x: center - 1, y: center },
        { x: center - 2, y: center },
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
    }

    function spawnFood() {
      do {
        food.x = Math.floor(Math.random() * TILE_COUNT);
        food.y = Math.floor(Math.random() * TILE_COUNT);
      } while (snake.some(s => s.x === food.x && s.y === food.y));
    }

    function drawCell(x, y, color, isHead = false) {
      const px = x * GRID_SIZE;
      const py = y * GRID_SIZE;
      ctx.fillStyle = color;
      ctx.fillRect(px + 1, py + 1, GRID_SIZE - 2, GRID_SIZE - 2);
      if (isHead) {
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillRect(px + 6, py + 5, 4, 4);
        ctx.fillRect(px + 12, py + 5, 4, 4);
      }
    }

    function draw() {
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      snake.forEach((seg, i) => {
        const isHead = i === 0;
        const green = isHead ? '#4ade80' : '#22c55e';
        drawCell(seg.x, seg.y, green, isHead);
      });

      ctx.fillStyle = '#ef4444';
      const fx = food.x * GRID_SIZE + GRID_SIZE / 2;
      const fy = food.y * GRID_SIZE + GRID_SIZE / 2;
      ctx.beginPath();
      ctx.arc(fx, fy, GRID_SIZE / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
    }

    function move() {
      direction = { ...nextDirection };
      const head = { ...snake[0] };
      head.x += direction.x;
      head.y += direction.y;

      if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
        gameOver();
        return;
      }
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        gameOver();
        return;
      }

      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        if (score > highScore) {
          highScore = score;
          highScoreEl.textContent = highScore;
          localStorage.setItem('snakeHighScore', String(highScore));
        }
        spawnFood();
      } else {
        snake.pop();
      }
    }

    function tick() {
      move();
      draw();
    }

    function startGame() {
      initSnake();
      spawnFood();
      score = 0;
      scoreEl.textContent = '0';
      startOverlay.classList.remove('visible');
      gameOverOverlay.classList.remove('visible');
      if (gameLoopId) clearInterval(gameLoopId);
      gameLoopId = setInterval(tick, gameSpeed);
    }

    function gameOver() {
      clearInterval(gameLoopId);
      gameLoopId = null;
      finalScoreEl.textContent = score;
      gameOverOverlay.classList.add('visible');
    }

    document.addEventListener('keydown', (e) => {
      if (startOverlay.classList.contains('visible') || gameOverOverlay.classList.contains('visible')) {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          if (gameOverOverlay.classList.contains('visible')) restartBtn.click();
          else startBtn.click();
        }
        return;
      }
      const key = e.key;
      e.preventDefault();
      if (key === 'ArrowUp' || key === 'w' || key === 'W') {
        if (direction.y === 0) nextDirection = { x: 0, y: -1 };
      } else if (key === 'ArrowDown' || key === 's' || key === 'S') {
        if (direction.y === 0) nextDirection = { x: 0, y: 1 };
      } else if (key === 'ArrowLeft' || key === 'a' || key === 'A') {
        if (direction.x === 0) nextDirection = { x: -1, y: 0 };
      } else if (key === 'ArrowRight' || key === 'd' || key === 'D') {
        if (direction.x === 0) nextDirection = { x: 1, y: 0 };
      }
    });

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);

    startOverlay.classList.add('visible');
    initSnake();
    spawnFood();
    draw();
  </script>
</body>
</html>
